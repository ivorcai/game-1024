<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>1024 — 数字合并游戏</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf8ef;
      --header-bg: #bbada0;
      --grid-bg: #bbada0;
      --cell-bg: #cdc1b4;
      --radius: 8px;
      --gap: 12px;
    }

    body {
      background: var(--bg);
      font-family: 'Segoe UI', 'PingFang SC', 'Helvetica Neue', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px 16px 40px;
      touch-action: none;
    }

    header {
      width: 100%;
      max-width: 480px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .title { font-size: 56px; font-weight: 900; color: #776e65; line-height: 1; }

    .scores { display: flex; gap: 8px; }

    .score-box {
      background: var(--header-bg);
      border-radius: var(--radius);
      padding: 6px 16px;
      text-align: center;
      min-width: 70px;
    }

    .score-box .label {
      font-size: 11px;
      font-weight: 700;
      color: #eee4da;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-box .value {
      font-size: 22px;
      font-weight: 900;
      color: #fff;
    }

    .score-box .value.pop { animation: scorePop .2s ease; }

    @keyframes scorePop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    .controls {
      width: 100%;
      max-width: 480px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .subtitle { font-size: 14px; color: #776e65; line-height: 1.5; }

    .btn {
      background: #8f7a66;
      color: #f9f6f2;
      border: none;
      border-radius: var(--radius);
      padding: 10px 20px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }

    .btn:hover  { background: #9f8a76; }
    .btn:active { transform: scale(.96); }

    .grid-wrapper {
      width: 100%;
      max-width: 480px;
      aspect-ratio: 1 / 1;
      background: var(--grid-bg);
      border-radius: 10px;
      padding: var(--gap);
      position: relative;
    }

    .grid-bg {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: var(--gap);
      width: 100%;
      height: 100%;
    }

    .cell-bg {
      background: var(--cell-bg);
      border-radius: var(--radius);
    }

    .tiles {
      position: absolute;
      inset: var(--gap);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: var(--gap);
    }

    .tile {
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: clamp(18px, 5vw, 36px);
      animation: tileAppear .15s ease;
    }

    @keyframes tileAppear {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .tile.merged { animation: tileMerge .2s ease; }

    @keyframes tileMerge {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    .t2    { background:#eee4da; color:#776e65; }
    .t4    { background:#ede0c8; color:#776e65; }
    .t8    { background:#f2b179; color:#f9f6f2; }
    .t16   { background:#f59563; color:#f9f6f2; }
    .t32   { background:#f67c5f; color:#f9f6f2; }
    .t64   { background:#f65e3b; color:#f9f6f2; }
    .t128  { background:#edcf72; color:#f9f6f2; font-size:clamp(15px,4vw,30px); box-shadow:0 0 20px rgba(237,207,114,.4); }
    .t256  { background:#edcc61; color:#f9f6f2; font-size:clamp(15px,4vw,30px); box-shadow:0 0 20px rgba(237,204,97,.4); }
    .t512  { background:#edc850; color:#f9f6f2; font-size:clamp(14px,3.8vw,28px); box-shadow:0 0 25px rgba(237,200,80,.5); }
    .t1024 { background:#3c9de0; color:#f9f6f2; font-size:clamp(12px,3.5vw,24px); box-shadow:0 0 30px rgba(60,157,224,.7); }
    .t2048 { background:#e8a000; color:#f9f6f2; font-size:clamp(12px,3.5vw,24px); box-shadow:0 0 30px rgba(232,160,0,.7); }
    .t-big { background:#3d3d3d; color:#f9f6f2; font-size:clamp(10px,3vw,20px); }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(238,228,218,.75);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .4s;
      z-index: 10;
    }

    .overlay.show { opacity: 1; pointer-events: all; }
    .overlay h2 { font-size: 40px; font-weight: 900; color: #776e65; }
    .overlay p  { font-size: 16px; color: #776e65; }

    .tips {
      margin-top: 20px;
      width: 100%;
      max-width: 480px;
      font-size: 13px;
      color: #b3a89e;
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<header>
  <div class="title">1024</div>
  <div class="scores">
    <div class="score-box">
      <div class="label">分数</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="score-box">
      <div class="label">最高</div>
      <div class="value" id="best">0</div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="subtitle">合并数字，<strong>达到 1024！</strong></div>
  <button class="btn" id="newGame">新游戏</button>
</div>

<div class="grid-wrapper" id="gridWrapper">
  <div class="grid-bg" id="gridBg"></div>
  <div class="tiles" id="tiles"></div>
  <div class="overlay" id="overlay">
    <h2 id="overlayTitle"></h2>
    <p id="overlayMsg"></p>
    <button class="btn" id="overlayBtn">再来一局</button>
  </div>
</div>

<div class="tips">
  PC：方向键移动 &nbsp;|&nbsp; 手机：滑动屏幕
</div>

<script>
const ROWS = 4, COLS = 4;
let board, score, best, gameOver, won;

function init() {
  board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
  score = 0; gameOver = false; won = false;
  best = parseInt(localStorage.getItem('1024-best') || '0');
  addTile(); addTile();
  render();
  hideOverlay();
}

function addTile() {
  const empty = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (!board[r][c]) empty.push([r, c]);
  if (!empty.length) return false;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  board[r][c] = Math.random() < 0.9 ? 2 : 4;
  return true;
}

function render() {
  const tilesEl = document.getElementById('tiles');
  tilesEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const v = board[r][c];
      const el = document.createElement('div');
      if (v) {
        el.className = 'tile ' + tileClass(v);
        el.textContent = v;
      }
      tilesEl.appendChild(el);
    }
  }
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
}

function tileClass(v) {
  const map = {2:'t2',4:'t4',8:'t8',16:'t16',32:'t32',64:'t64',
    128:'t128',256:'t256',512:'t512',1024:'t1024',2048:'t2048'};
  return map[v] || 't-big';
}

function slide(row) {
  let arr = row.filter(v => v);
  let gained = 0;
  for (let i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i+1]) {
      arr[i] *= 2; gained += arr[i];
      arr.splice(i+1, 1);
    }
  }
  while (arr.length < COLS) arr.push(0);
  return { arr, gained };
}

function transpose(b) { return b[0].map((_, c) => b.map(r => r[c])); }
function flipH(b) { return b.map(r => [...r].reverse()); }
function flipV(b) { return [...b].reverse(); }

function move(dir) {
  if (gameOver) return;
  let moved = false, totalGained = 0;
  let b = board.map(r => [...r]);

  // Transform so we always slide left
  if (dir === 'right')       { b = flipH(b); }
  else if (dir === 'up')     { b = transpose(b); }
  else if (dir === 'down')   { b = transpose(flipV(b)); }

  for (let r = 0; r < ROWS; r++) {
    const orig = b[r].join();
    const {arr, gained} = slide(b[r]);
    if (arr.join() !== orig) moved = true;
    b[r] = arr; totalGained += gained;
  }

  // Reverse transform
  if (dir === 'right')       { b = flipH(b); }
  else if (dir === 'up')     { b = transpose(b); }
  else if (dir === 'down')   { b = flipV(transpose(b)); }

  if (!moved) return;
  board = b;
  score += totalGained;
  if (score > best) { best = score; localStorage.setItem('1024-best', best); }
  addTile(); render(); animateScore(); checkState();
}

function animateScore() {
  const el = document.getElementById('score');
  el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
}

function checkState() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c] >= 1024 && !won) {
        won = true;
        showOverlay('🎉 你赢了！', '已达到 1024，继续挑战更高分！', false);
        return;
      }
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      if (!board[r][c]) return;
      if (r < ROWS-1 && board[r][c] === board[r+1][c]) return;
      if (c < COLS-1 && board[r][c] === board[r][c+1]) return;
    }
  gameOver = true;
  showOverlay('游戏结束', `最终得分：${score}`, true);
}

function showOverlay(title, msg, persist) {
  document.getElementById('overlayTitle').textContent = title;
  document.getElementById('overlayMsg').textContent = msg;
  document.getElementById('overlay').classList.add('show');
  if (!persist) setTimeout(() => document.getElementById('overlay').classList.remove('show'), 2500);
}

function hideOverlay() { document.getElementById('overlay').classList.remove('show'); }

document.addEventListener('keydown', e => {
  const map = {ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

let tx, ty;
const gw = document.getElementById('gridWrapper');
gw.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:true});
gw.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < 10) return;
  move(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up'));
}, {passive:true});

document.getElementById('newGame').onclick = init;
document.getElementById('overlayBtn').onclick = init;

const bg = document.getElementById('gridBg');
for (let i = 0; i < 16; i++) { const d = document.createElement('div'); d.className='cell-bg'; bg.appendChild(d); }

init();
</script>
</body>
</html>
