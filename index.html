<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>1024 — 数字合并游戏</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #faf8ef;
      font-family: 'Segoe UI', 'PingFang SC', 'Helvetica Neue', sans-serif;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; padding: 20px 16px 40px;
      touch-action: none; user-select: none;
    }

    header {
      width: 100%; max-width: 480px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .title { font-size: 52px; font-weight: 900; color: #776e65; line-height: 1; }
    .scores { display: flex; gap: 8px; }
    .score-box {
      background: #bbada0; border-radius: 8px;
      padding: 6px 14px; text-align: center; min-width: 68px;
    }
    .score-box .label { font-size: 11px; font-weight: 700; color: #eee4da; text-transform: uppercase; letter-spacing: 1px; }
    .score-box .value { font-size: 22px; font-weight: 900; color: #fff; }
    .pop { animation: scorePop .25s ease; }
    @keyframes scorePop { 0%{transform:scale(1)} 50%{transform:scale(1.35)} 100%{transform:scale(1)} }

    .controls {
      width: 100%; max-width: 480px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .subtitle { font-size: 14px; color: #776e65; }
    .btn {
      background: #8f7a66; color: #f9f6f2; border: none;
      border-radius: 8px; padding: 10px 20px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn:hover  { background: #9f8a76; }
    .btn:active { transform: scale(.95); }

    /* Grid wrapper */
    .grid-wrapper {
      width: 100%; max-width: 480px;
      aspect-ratio: 1/1;
      background: #bbada0;
      border-radius: 10px;
      padding: 10px;
      position: relative;
    }

    /* CSS Grid — shared by both bg and tile layers */
    .grid-layer {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 10px;
      width: 100%; height: 100%;
    }

    /* Background cells */
    .cell-bg { background: #cdc1b4; border-radius: 6px; }

    /* Tile layer: absolute, same grid */
    #tile-layer {
      position: absolute;
      inset: 10px;
    }

    /* Each tile is a grid item — CSS Grid determines its size automatically */
    .tile {
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900;
      /* transition only on transform (for FLIP animation) */
      transition: transform 120ms cubic-bezier(.25,.46,.45,.94);
      will-change: transform;
    }

    /* Tile appears */
    .tile.new-tile { animation: tileAppear 150ms ease both; }
    @keyframes tileAppear {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    /* Tile merge pop */
    .tile.merge-pop { animation: mergePop 200ms ease both; }
    @keyframes mergePop {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    /* Colors */
    .t2    { background:#eee4da; color:#776e65; }
    .t4    { background:#ede0c8; color:#776e65; }
    .t8    { background:#f2b179; color:#f9f6f2; }
    .t16   { background:#f59563; color:#f9f6f2; }
    .t32   { background:#f67c5f; color:#f9f6f2; }
    .t64   { background:#f65e3b; color:#f9f6f2; }
    .t128  { background:#edcf72; color:#f9f6f2; box-shadow:0 0 16px rgba(237,207,114,.5); }
    .t256  { background:#edcc61; color:#f9f6f2; box-shadow:0 0 16px rgba(237,204,97,.5); }
    .t512  { background:#edc850; color:#f9f6f2; box-shadow:0 0 20px rgba(237,200,80,.6); }
    .t1024 { background:#3c9de0; color:#f9f6f2; box-shadow:0 0 26px rgba(60,157,224,.75); }
    .t2048 { background:#e8a000; color:#f9f6f2; box-shadow:0 0 26px rgba(232,160,0,.75); }
    .t-big { background:#3d3d3d; color:#f9f6f2; }

    /* Overlay */
    .overlay {
      position: absolute; inset: 0; background: rgba(238,228,218,.75);
      border-radius: 10px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      opacity: 0; pointer-events: none; transition: opacity .4s; z-index: 20;
    }
    .overlay.show { opacity: 1; pointer-events: all; }
    .overlay h2 { font-size: 38px; font-weight: 900; color: #776e65; }
    .overlay p  { font-size: 16px; color: #776e65; }

    .tips { margin-top: 18px; font-size: 13px; color: #b3a89e; text-align: center; line-height: 1.8; }
    .ver  { margin-top: 6px; font-size: 11px; color: #ccc5bb; text-align: center; }
  </style>
</head>
<body>

<header>
  <div class="title">1024</div>
  <div class="scores">
    <div class="score-box"><div class="label">分数</div><div class="value" id="score">0</div></div>
    <div class="score-box"><div class="label">最高</div><div class="value" id="best">0</div></div>
  </div>
</header>

<div class="controls">
  <div class="subtitle">合并数字，<strong>达到 1024！</strong></div>
  <button class="btn" id="newGame">新游戏</button>
</div>

<div class="grid-wrapper" id="gridWrapper">
  <!-- Background cell layer -->
  <div class="grid-layer" id="gridBg"></div>
  <!-- Tile layer: same grid, absolute. width/height auto (determined by inset) -->
  <div class="grid-layer" id="tile-layer" style="position:absolute;inset:10px;width:auto;height:auto;"></div>
  <div class="overlay" id="overlay">
    <h2 id="overlayTitle"></h2>
    <p id="overlayMsg"></p>
    <button class="btn" id="overlayBtn">再来一局</button>
  </div>
</div>

<div class="tips">PC：方向键 &nbsp;|&nbsp; 手机：滑动屏幕</div>
<div class="ver">v1.9</div>

<script>
// ── Constants ──────────────────────────────────────────────────
const ROWS = 4, COLS = 4, MOVE_MS = 120;

// ── State ──────────────────────────────────────────────────────
let grid, score, best, gameOver, won, busy;
let uid = 0;

// grid[r][c] = { id, val } | null

// ── DOM helpers ────────────────────────────────────────────────
const layer = () => document.getElementById('tile-layer');

// Place tile into CSS Grid at (r,c) — size determined by grid, not JS!
function placeTile(el, r, c) {
  el.style.gridRow    = r + 1;
  el.style.gridColumn = c + 1;
}

function tileClass(v) {
  const m={2:'t2',4:'t4',8:'t8',16:'t16',32:'t32',64:'t64',
    128:'t128',256:'t256',512:'t512',1024:'t1024',2048:'t2048'};
  return m[v]||'t-big';
}

function tileFontSize(el, v) {
  // font-size relative to tile's actual rendered width
  const w = el.getBoundingClientRect().width || 80;
  const len = String(v).length;
  el.style.fontSize = Math.max(12, w * (.42 - (len-1)*.048)) + 'px';
}

function makeEl(id, val, r, c, isNew) {
  const el = document.createElement('div');
  el.id = 't' + id;
  el.className = 'tile ' + tileClass(val);
  el.textContent = val;
  placeTile(el, r, c);
  layer().appendChild(el);
  // Font size after layout
  requestAnimationFrame(() => tileFontSize(el, val));
  if (isNew) {
    // slight delay so grid places it first
    el.style.transform = 'scale(0)';
    el.style.opacity = '0';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.style.transition = 'transform 150ms ease, opacity 150ms ease';
      el.style.transform = '';
      el.style.opacity = '';
    }));
  }
  return el;
}

function getEl(id) { return document.getElementById('t' + id); }
function removeEl(id) { getEl(id)?.remove(); }

// FLIP animation: move tile from current grid pos to new grid pos
function flipMove(el, toR, toC) {
  if (!el) return;
  const from = el.getBoundingClientRect();
  placeTile(el, toR, toC);
  requestAnimationFrame(() => {
    const to = el.getBoundingClientRect();
    const dx = from.left - to.left;
    const dy = from.top  - to.top;
    if (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5) return; // no movement
    el.style.transition = 'none';
    el.style.transform  = `translate(${dx}px,${dy}px)`;
    requestAnimationFrame(() => {
      el.style.transition = `transform ${MOVE_MS}ms cubic-bezier(.25,.46,.45,.94)`;
      el.style.transform  = '';
    });
  });
}

// ── Game logic ──────────────────────────────────────────────────
function init() {
  grid = Array.from({length:ROWS}, ()=>Array(COLS).fill(null));
  score=0; gameOver=false; won=false; busy=false;
  best = parseInt(localStorage.getItem('1024b')||'0');
  layer().innerHTML = '';
  updateScoreDisplay(0);
  hideOverlay();
  spawn(false); spawn(false);
}

function spawn(animated) {
  const empty=[];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(!grid[r][c]) empty.push([r,c]);
  if(!empty.length) return false;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  const id=++uid, val=Math.random()<.9?2:4;
  grid[r][c] = {id, val};
  makeEl(id, val, r, c, animated);
  return true;
}

function slideRow(row) {
  const arr = row.map((t,c)=>t?{...t,srcCol:c}:null).filter(Boolean);
  const moves=[], result=[];
  for(let i=0;i<arr.length;i++) {
    if(i+1<arr.length && arr[i].val===arr[i+1].val) {
      result.push({id:arr[i].id, val:arr[i].val*2, merged:true, loser:arr[i+1].id});
      i++;
    } else {
      result.push({id:arr[i].id, val:arr[i].val, merged:false});
    }
  }
  let gained=0;
  result.forEach((t,dc)=>{
    if(t.merged){
      gained+=t.val;
      moves.push({id:t.id,   toCol:dc, merged:true,  val:t.val, remove:false});
      moves.push({id:t.loser,toCol:dc, merged:false, val:0,     remove:true});
    } else {
      moves.push({id:t.id, toCol:dc, merged:false, val:t.val, remove:false});
    }
  });
  const finalRow=Array(COLS).fill(null);
  result.forEach((t,i)=>{ finalRow[i]={id:t.id, val:t.val}; });
  return {finalRow, moves, gained};
}

function transpose(b){return b[0].map((_,c)=>b.map(r=>r[c]));}
function flipH(b){return b.map(r=>[...r].reverse());}
function flipV(b){return [...b].reverse();}

function transformCoords(dir, r, c) {
  // Maps (r,c) in transformed space back to real (r,c)
  if(dir==='right')  return [r, COLS-1-c];
  if(dir==='up')     return [c, r];
  if(dir==='down')   return [ROWS-1-c, r];
  return [r, c]; // left
}

function move(dir) {
  if(gameOver||busy) return;
  busy=true;

  let b = grid.map(r=>r.map(t=>t?{...t}:null));
  if(dir==='right')     b=flipH(b);
  else if(dir==='up')   b=transpose(b);
  else if(dir==='down') b=transpose(flipV(b));

  let anyMoved=false, totalGained=0;
  const allMoves=[];

  for(let r=0;r<ROWS;r++){
    const orig=b[r].map(t=>t?t.id+':'+t.val:'0').join();
    const {finalRow,moves,gained}=slideRow(b[r]);
    if(finalRow.map(t=>t?t.id+':'+t.val:'0').join()!==orig) anyMoved=true;
    totalGained+=gained;
    b[r]=finalRow;
    moves.forEach(m=>allMoves.push({...m, tRow:r}));
  }

  if(!anyMoved){busy=false;return;}

  // Inverse transform b
  let bFinal=b;
  if(dir==='right')     bFinal=flipH(b);
  else if(dir==='up')   bFinal=transpose(b);
  else if(dir==='down') bFinal=flipV(transpose(b));

  grid=bFinal;
  score+=totalGained;
  if(score>best){best=score;localStorage.setItem('1024b',best);}
  updateScoreDisplay(totalGained);

  // Animate all tiles using FLIP
  allMoves.forEach(m=>{
    const [realR, realC]=transformCoords(dir, m.tRow, m.toCol);
    const el=getEl(m.id);
    if(!el) return;
    if(m.remove){
      // slide losing tile to merge destination, then remove
      flipMove(el, realR, realC);
      el.style.zIndex='1';
    } else {
      flipMove(el, realR, realC);
    }
  });

  setTimeout(()=>{
    // Remove losing tiles
    allMoves.filter(m=>m.remove).forEach(m=>removeEl(m.id));
    // Update merged tiles & pop
    allMoves.filter(m=>m.merged&&!m.remove).forEach(m=>{
      const el=getEl(m.id);
      if(!el) return;
      el.className='tile '+tileClass(m.val);
      el.textContent=m.val;
      tileFontSize(el, m.val);
      // pop animation
      el.style.animation='none';
      void el.offsetWidth;
      el.style.animation='mergePop 200ms ease';
    });
    spawn(true);
    busy=false;
    checkState();
  }, MOVE_MS+20);
}

function updateScoreDisplay(gained){
  document.getElementById('score').textContent=score;
  document.getElementById('best').textContent=best;
  if(gained>0){
    const el=document.getElementById('score');
    el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
  }
}

function checkState(){
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++)
    if(grid[r][c]?.val>=1024&&!won){won=true;showOverlay('🎉 你赢了！','已达到 1024！',false);return;}
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(!grid[r][c]) return;
    if(r<ROWS-1&&grid[r][c].val===grid[r+1][c]?.val) return;
    if(c<COLS-1&&grid[r][c].val===grid[r][c+1]?.val) return;
  }
  gameOver=true; showOverlay('游戏结束',`得分：${score}`,true);
}

function showOverlay(title,msg,persist){
  document.getElementById('overlayTitle').textContent=title;
  document.getElementById('overlayMsg').textContent=msg;
  document.getElementById('overlay').classList.add('show');
  if(!persist) setTimeout(()=>document.getElementById('overlay').classList.remove('show'),2500);
}
function hideOverlay(){document.getElementById('overlay').classList.remove('show');}

// ── Input ──────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const m={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if(m[e.key]){e.preventDefault();move(m[e.key]);}
});

let tx0,ty0;
const gw=document.getElementById('gridWrapper');
gw.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;},{passive:true});
gw.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx0, dy=e.changedTouches[0].clientY-ty0;
  if(Math.max(Math.abs(dx),Math.abs(dy))<15) return;
  move(Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up'));
},{passive:true});

document.getElementById('newGame').onclick=init;
document.getElementById('overlayBtn').onclick=init;

// ── Build background ───────────────────────────────────────────
const bg=document.getElementById('gridBg');
for(let i=0;i<16;i++){const d=document.createElement('div');d.className='cell-bg';bg.appendChild(d);}

init();
</script>
</body>
</html>
